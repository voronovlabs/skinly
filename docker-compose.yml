# =============================================================================
# Skinly — docker-compose (PRODUCTION-safe)
#
# Сервисы:
#   - postgres : НЕ публикуется наружу. Доступен только по internal network.
#   - web      : production-сборка Next, слушает :3000 (за Caddy/Nginx).
#                Использует Dockerfile (multi-stage standalone).
#                В build context'е НЕТ scripts/ и data/ (.dockerignore) —
#                правки скрейпера не триггерят rebuild web.
#   - tools    : on-demand box для prisma CLI и скрейперов.
#                Использует отдельный Dockerfile.tools (lightweight image
#                с node + project deps). scripts/, prisma/, data/ маунтятся
#                volume'ом с хоста — правки скриптов и схемы НЕ требуют
#                rebuild'а. Под profile "tools" — `up -d` его не стартует.
#
# Запуск на сервере (только web + postgres):
#   docker compose up -d --build
#
# Применить миграции:
#   docker compose --profile tools run --rm tools npx prisma migrate deploy
#
# Засеять БД:
#   docker compose --profile tools run --rm tools npx prisma db seed
#
# Запустить скрейпер:
#   docker compose --profile tools run --rm tools \
#     npm run scrape:national-catalog -- --limit 20
#
# Локальный dev (postgres на хосте + npx на хосте):
#   см. docker-compose.dev.yml
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: skinly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skinly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skinly}
      POSTGRES_DB: ${POSTGRES_DB:-skinly}
    volumes:
      - skinly-pg-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U ${POSTGRES_USER:-skinly} -d ${POSTGRES_DB:-skinly}"
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - skinly-net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skinly-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-skinly}:${POSTGRES_PASSWORD:-skinly}@postgres:5432/${POSTGRES_DB:-skinly}?schema=public
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      FEATURE_AI_EXPLANATION: ${FEATURE_AI_EXPLANATION:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FEATURE_OPENBEAUTYFACTS: ${FEATURE_OPENBEAUTYFACTS:-false}
    ports:
      - "3000:3000"
    networks:
      - skinly-net

  tools:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile.tools
    image: skinly-tools:local
    container_name: skinly-tools
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-skinly}:${POSTGRES_PASSWORD:-skinly}@postgres:5432/${POSTGRES_DB:-skinly}?schema=public
      # Включаем colored output Prisma внутри docker run -it
      FORCE_COLOR: "1"
    working_dir: /app
    volumes:
      # Скрипты и схема — read-only маунт с хоста. Любая правка scripts/
      # или prisma/ видна сразу, без rebuild'а. Read-only защищает от
      # случайной модификации репо изнутри контейнера.
      - ./scripts:/app/scripts:ro
      - ./prisma:/app/prisma:ro
      # Куда скрейпер пишет JSONL и checkpoint. Должна быть writable.
      - ./data:/app/data
    networks:
      - skinly-net

volumes:
  skinly-pg-data:

networks:
  skinly-net:
    driver: bridge
