# =============================================================================
# Skinly — docker-compose (PRODUCTION-safe)
#
# Сервисы:
#   - postgres : НЕ публикуется наружу. Доступен только через internal network.
#   - web      : production-сборка Next, слушает :3000 (за Caddy/Nginx).
#   - migrate  : on-demand утилита для prisma CLI (migrate deploy / db seed /
#                migrate status / studio). Не стартует с `up` — лежит под
#                profile "tools". Использует stage `builder` Dockerfile'а,
#                в котором уже есть полный node_modules с локальной prisma
#                из package.json (а не v7 из npm registry).
#
# Запуск на сервере:
#   docker compose up -d --build
#   docker compose --profile tools run --rm migrate npx prisma migrate deploy
#
# Локальный dev (postgres на хосте + npx на хосте):
#   см. docker-compose.dev.yml
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: skinly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skinly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skinly}
      POSTGRES_DB: ${POSTGRES_DB:-skinly}
    volumes:
      - skinly-pg-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U ${POSTGRES_USER:-skinly} -d ${POSTGRES_DB:-skinly}"
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - skinly-net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skinly-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-skinly}:${POSTGRES_PASSWORD:-skinly}@postgres:5432/${POSTGRES_DB:-skinly}?schema=public
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      FEATURE_AI_EXPLANATION: ${FEATURE_AI_EXPLANATION:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FEATURE_OPENBEAUTYFACTS: ${FEATURE_OPENBEAUTYFACTS:-false}
    ports:
      - "3000:3000"
    networks:
      - skinly-net

  migrate:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: skinly-migrate:local
    container_name: skinly-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-skinly}:${POSTGRES_PASSWORD:-skinly}@postgres:5432/${POSTGRES_DB:-skinly}?schema=public
    working_dir: /app
    networks:
      - skinly-net
    # Дефолт — подсказка. Реальные команды передаются через `run --rm`.
    command:
      - "sh"
      - "-c"
      - "echo 'Use: docker compose --profile tools run --rm migrate npx prisma <cmd>'"

volumes:
  skinly-pg-data:

networks:
  skinly-net:
    driver: bridge
