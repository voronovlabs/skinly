# =============================================================================
# Skinly — local-dev override
#
# Использовать ПОВЕРХ docker-compose.yml ТОЛЬКО на машине разработчика,
# когда нужно поднимать postgres для `npm run dev` на хосте.
#
# Запуск:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d postgres
#   npm run dev
#
# Что добавляется:
#   - postgres публикуется на 127.0.0.1:5432 (только loopback хоста, не наружу)
# =============================================================================

services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"
